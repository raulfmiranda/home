<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acompanhamento do ciclo menstrual — Sistema Creighton.">
  <meta name="theme-color" content="#008080">
  <title>Ciclo — Creighton Tools</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:#008080; --silver:#c0c0c0; --sd:#808080; --sl:#e8e8e8;
      --white:#ffffff; --black:#000000; --navy:#000080;
      --scan:rgba(0,0,0,0.05); --cw:58px;
    }
    html, body { min-height:100vh; }
    body {
      font-family:'Share Tech Mono','Courier New',monospace;
      background:var(--teal);
      background-image:repeating-linear-gradient(0deg,var(--scan) 0,var(--scan) 1px,transparent 1px,transparent 3px);
      padding:0 0 50px; color:var(--black);
    }
    .tb {
      background:linear-gradient(to right,var(--navy),#1084d0); color:var(--white);
      font-family:'VT323',monospace; font-size:1.1em; padding:5px 10px;
      display:flex; align-items:center; gap:8px; letter-spacing:.05em;
      border-bottom:2px solid var(--black); position:sticky; top:0; z-index:50;
      flex-wrap:wrap;
    }
    .tb-btns { margin-left:auto; display:flex; gap:5px; flex-wrap:wrap; }
    .btn, a.btn {
      font-family:'VT323',monospace; font-size:.95em; background:var(--silver);
      color:var(--black); border-top:2px solid var(--white); border-left:2px solid var(--white);
      border-right:2px solid var(--sd); border-bottom:2px solid var(--sd);
      padding:1px 9px; cursor:pointer; text-decoration:none;
      display:inline-flex; align-items:center; gap:4px; height:22px;
      letter-spacing:.02em; white-space:nowrap; -webkit-tap-highlight-color:transparent;
    }
    .btn:hover, a.btn:hover { background:var(--sl); }
    .btn:active, a.btn:active {
      border-top:2px solid var(--sd); border-left:2px solid var(--sd);
      border-right:2px solid var(--white); border-bottom:2px solid var(--white);
    }
    .btn.red { color:#880000; } .btn.grn { color:#006600; } .btn.blue { color:#000080; }
    .win {
      margin:14px 10px; background:var(--silver);
      border-top:3px solid var(--white); border-left:3px solid var(--white);
      border-right:3px solid var(--sd); border-bottom:3px solid var(--sd);
      padding-bottom:10px;
    }
    .tscroll { overflow-x:auto; padding:10px 10px 4px; -webkit-overflow-scrolling:touch; }
    .ct { border-collapse:collapse; table-layout:fixed; background:var(--white);
      border-top:2px solid var(--sd); border-left:2px solid var(--sd);
      border-right:2px solid var(--white); border-bottom:2px solid var(--white); }
    .ct th, .ct td { width:var(--cw); min-width:var(--cw); max-width:var(--cw);
      border:1px solid #b0b0b0; padding:0; vertical-align:top; }
    .rl {
      width:60px; min-width:60px; max-width:60px;
      background:linear-gradient(to bottom,#f0f0f0,#d8d8d8);
      font-family:'VT323',monospace; font-size:.82em; color:var(--navy);
      text-align:center; padding:2px 1px; border-right:2px solid #aaa; vertical-align:middle;
    }
    .dh {
      background:linear-gradient(to bottom,#1a1a8e,var(--navy)); color:var(--white);
      font-family:'VT323',monospace; font-size:1em; padding:3px 0;
      text-align:center; border-bottom:2px solid #000060; user-select:none;
    }
    .clr td {
      background:linear-gradient(to right,#000080,#003090); color:var(--white);
      font-family:'VT323',monospace; font-size:1em; letter-spacing:.06em;
      padding:4px 10px; border-top:3px solid #5555cc; border-bottom:2px solid #000060;
    }
    .sc { padding:0; cursor:pointer; position:relative; height:var(--cw); overflow:hidden; }
    .sc:hover  { filter:brightness(.92); }
    .sc:active { filter:brightness(.80); }
    .sw { width:100%; height:100%; display:block; position:absolute; inset:0; }
    .sw svg { width:100%; height:100%; display:block; }
    /* DATA — apenas dd/mm, fonte menor para caber na célula */
    .dtc { background:var(--white); padding:0; border-bottom:1px solid #d0d0d0; }
    .dbtn {
      width:100%; border:none; outline:none; font-family:'Share Tech Mono',monospace;
      font-size:.62em; text-align:center; background:transparent; padding:2px 1px;
      color:var(--navy); font-weight:bold; cursor:pointer; display:block;
      white-space:nowrap; overflow:hidden; line-height:1.3;
    }
    .dbtn:hover { background:#e8e8ff; }
    .dbtn:focus { outline:1px dotted var(--navy); outline-offset:-1px; }
    .dbtn.af { color:#4a4a8a; font-weight:normal; }
    .dbtn.em { color:#bbb; font-weight:normal; }
    .desc-block { background:var(--white); padding:0; }
    .sub-inp {
      flex:1; border:none; outline:none; font-family:'Share Tech Mono',monospace;
      font-size:.64em; text-align:center; background:transparent; padding:1px 1px;
      color:var(--black); text-transform:uppercase; resize:none;
      min-height:20px; line-height:1.25; overflow:hidden; display:block; width:100%;
      border-bottom:1px solid transparent;
    }
    .sub-inp + .sub-inp { border-top:1px dotted #eee; }
    .sub-inp:focus { outline:none; background:rgba(0,0,128,.025); }
    @media (max-width:640px) {
      .tscroll { display:none; }
      .mv { display:block; padding:6px; }
    }
    @media (min-width:641px) {
      .mv { display:none; }
    }
    .mch {
      background:linear-gradient(to right,#000080,#003090); color:var(--white);
      font-family:'VT323',monospace; font-size:1.05em; letter-spacing:.06em;
      padding:5px 10px; border-top:3px solid #5555cc; border-bottom:2px solid #000060;
      margin-bottom:4px;
    }
    .mdg { display:grid; grid-template-columns:1fr; gap:3px; margin-bottom:10px; }
    .mdr {
      display:grid; grid-template-columns:28px 50px 44px 1fr;
      align-items:stretch; border:1px solid #b8b8b8; background:var(--white); min-height:66px;
    }
    .mdn {
      background:linear-gradient(to bottom,#1a1a8e,var(--navy)); color:var(--white);
      font-family:'VT323',monospace; font-size:.82em; text-align:center;
      display:flex; align-items:center; justify-content:center;
      border-right:1px solid #777; user-select:none;
    }
    .msc { cursor:pointer; position:relative; overflow:hidden; border-right:1px solid #b0b0b0; }
    .msc:hover  { filter:brightness(.92); }
    .msc:active { filter:brightness(.80); }
    .msc .sw { position:absolute; inset:0; }
    /* DATA mobile — dd/mm apenas */
    .mdc { border-right:1px solid #b0b0b0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .mdb {
      border:none; outline:none; font-family:'Share Tech Mono',monospace;
      font-size:.60em; text-align:center; background:transparent; padding:1px 2px;
      color:var(--navy); font-weight:bold; cursor:pointer; width:100%;
      white-space:nowrap; overflow:hidden;
    }
    .mdb.em { color:#bbb; font-weight:normal; }
    .mdb.af { color:#4a4a8a; font-weight:normal; }
    .mdb:focus { outline:1px dotted var(--navy); }
    .m-desc-block { display:flex; flex-direction:column; width:100%; }
    .m-sub-inp {
      flex:1; border:none; outline:none; font-family:'Share Tech Mono',monospace;
      font-size:.63em; text-align:center; background:transparent; padding:1px 2px;
      color:var(--black); text-transform:uppercase; resize:none;
      min-height:20px; line-height:1.25; overflow:hidden;
      border-bottom:1px solid transparent;
    }
    .m-sub-inp + .m-sub-inp { border-top:1px dotted #eee; }
    .m-sub-inp:focus { outline:none; background:rgba(0,0,128,.025); }
    .bb { display:flex; gap:6px; margin:8px 10px 0; flex-wrap:wrap; }
    .btnm {
      font-family:'VT323',monospace; font-size:1.02em; letter-spacing:.04em;
      background:var(--silver); color:var(--black);
      border-top:3px solid var(--white); border-left:3px solid var(--white);
      border-right:3px solid var(--sd); border-bottom:3px solid var(--sd);
      padding:4px 12px; cursor:pointer; flex:1; min-width:90px;
      -webkit-tap-highlight-color:transparent;
    }
    .btnm:hover { background:var(--sl); }
    .btnm:active {
      border-top:3px solid var(--sd); border-left:3px solid var(--sd);
      border-right:3px solid var(--white); border-bottom:3px solid var(--white);
    }
    .btnm.blue { color:var(--navy); } .btnm.grn { color:#006600; } .btnm.red { color:#880000; }
    .add-cycle-wrap { margin:6px 10px 0; }
    .btn-add-cycle {
      font-family:'VT323',monospace; font-size:1.05em; letter-spacing:.04em;
      background:var(--silver); color:#006600;
      border-top:3px solid var(--white); border-left:3px solid var(--white);
      border-right:3px solid var(--sd); border-bottom:3px solid var(--sd);
      padding:5px 18px; cursor:pointer; width:100%;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-add-cycle:hover { background:var(--sl); }
    .btn-add-cycle:active {
      border-top:3px solid var(--sd); border-left:3px solid var(--sd);
      border-right:3px solid var(--white); border-bottom:3px solid var(--white);
    }
    .ov { display:none; position:fixed; inset:0; z-index:199; }
    .ov.open { display:block; }
    .sp, .cp {
      display:none; position:fixed; z-index:200; background:var(--sl);
      border-top:3px solid var(--white); border-left:3px solid var(--white);
      border-right:3px solid var(--sd); border-bottom:3px solid var(--sd);
      padding:8px; box-shadow:4px 4px 0 rgba(0,0,0,.35);
    }
    .sp.open, .cp.open { display:block; }
    .sp { min-width:238px; max-width:290px; max-height:78vh; overflow-y:auto; }
    .cp { width:200px; }
    .pt {
      font-family:'VT323',monospace; font-size:.95em; color:var(--navy);
      letter-spacing:.05em; margin-bottom:6px; border-bottom:1px solid var(--sd);
      padding-bottom:3px; display:flex; justify-content:space-between; align-items:center;
      position:sticky; top:0; background:var(--sl); z-index:1; padding-top:2px;
    }
    .pc {
      font-family:'VT323',monospace; font-size:1em; background:var(--silver); color:var(--black);
      border-top:2px solid var(--white); border-left:2px solid var(--white);
      border-right:2px solid var(--sd); border-bottom:2px solid var(--sd);
      padding:0 7px; cursor:pointer; line-height:1.5;
    }
    .pc:active {
      border-top:2px solid var(--sd); border-left:2px solid var(--sd);
      border-right:2px solid var(--white); border-bottom:2px solid var(--white);
    }
    .pg { display:flex; flex-wrap:wrap; gap:4px; }
    .psl {
      width:100%; font-family:'VT323',monospace; font-size:.8em; color:var(--sd);
      letter-spacing:.05em; margin-top:5px; margin-bottom:1px;
      border-bottom:1px solid #d0d0d0; padding-bottom:1px;
    }
    .po {
      display:flex; flex-direction:column; align-items:center; gap:2px;
      cursor:pointer; padding:3px 4px; border:2px solid transparent;
    }
    .po:hover { border-color:var(--navy); background:rgba(0,0,128,.07); }
    .po.sel {
      border-top:2px solid var(--sd); border-left:2px solid var(--sd);
      border-right:2px solid var(--white); border-bottom:2px solid var(--white);
      background:rgba(0,0,128,.1);
    }
    .pol { font-family:'VT323',monospace; font-size:.68em; color:var(--black); text-align:center; max-width:38px; line-height:1.1; }
    .ch { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .cn {
      font-family:'VT323',monospace; font-size:1.1em; background:var(--silver); color:var(--black);
      border-top:2px solid var(--white); border-left:2px solid var(--white);
      border-right:2px solid var(--sd); border-bottom:2px solid var(--sd);
      width:24px; height:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;
    }
    .cn:active {
      border-top:2px solid var(--sd); border-left:2px solid var(--sd);
      border-right:2px solid var(--white); border-bottom:2px solid var(--white);
    }
    .cml { font-family:'VT323',monospace; font-size:.9em; color:var(--navy); text-align:center; flex:1; letter-spacing:.04em; }
    .cg  { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
    .cdw { font-family:'VT323',monospace; font-size:.72em; color:var(--sd); text-align:center; padding:1px 0; }
    .cdy {
      font-family:'Share Tech Mono',monospace; font-size:.72em; text-align:center;
      padding:3px 1px; cursor:pointer; border:1px solid transparent; color:var(--black);
    }
    .cdy:hover { background:var(--navy); color:var(--white); border-color:var(--navy); }
    .cdy.today { background:#efefff; border-color:var(--navy); font-weight:bold; }
    .cdy.emp { cursor:default; }
    .cdy.emp:hover { background:transparent; border-color:transparent; color:var(--black); }
    .modal {
      display:none; position:fixed; z-index:210; background:var(--sl);
      border-top:3px solid var(--white); border-left:3px solid var(--white);
      border-right:3px solid var(--sd); border-bottom:3px solid var(--sd);
      padding:10px; box-shadow:4px 4px 0 rgba(0,0,0,.4);
      width:min(340px,94vw); top:50%; left:50%; transform:translate(-50%,-50%);
    }
    .modal.open { display:block; }
    .modal-ov { display:none; position:fixed; inset:0; z-index:209; background:rgba(0,0,0,.4); }
    .modal-ov.open { display:block; }
    .mh {
      font-family:'VT323',monospace; font-size:1em; color:var(--navy); letter-spacing:.05em;
      margin-bottom:8px; border-bottom:1px solid var(--sd); padding-bottom:4px;
      display:flex; justify-content:space-between; align-items:center;
    }
    .imp-ta {
      width:100%; height:80px; font-family:'Share Tech Mono',monospace;
      font-size:.72em; border:1px solid var(--sd); background:var(--white);
      padding:4px; resize:vertical; color:var(--black); margin-bottom:6px; display:block;
    }
    .imp-file {
      font-family:'Share Tech Mono',monospace; font-size:.72em;
      margin-bottom:6px; display:block; color:var(--black);
    }
    .imp-msg { font-family:'Share Tech Mono',monospace; font-size:.72em; margin-left:8px; }
    .share-modal {
      display:none; position:fixed; z-index:210; background:var(--sl);
      border-top:3px solid var(--white); border-left:3px solid var(--white);
      border-right:3px solid var(--sd); border-bottom:3px solid var(--sd);
      padding:10px; box-shadow:4px 4px 0 rgba(0,0,0,.4);
      width:min(340px,94vw); top:50%; left:50%; transform:translate(-50%,-50%);
    }
    .share-modal.open { display:block; }
    .share-url {
      font-family:'Share Tech Mono',monospace; font-size:.68em; color:#333;
      word-break:break-all; margin-bottom:8px; line-height:1.4;
      border:1px solid var(--sd); background:var(--white); padding:4px;
    }
    .rp-modal {
      display:none; position:fixed; z-index:210; background:var(--sl);
      border-top:3px solid var(--white); border-left:3px solid var(--white);
      border-right:3px solid var(--sd); border-bottom:3px solid var(--sd);
      padding:10px; box-shadow:4px 4px 0 rgba(0,0,0,.4);
      width:min(520px,96vw); max-height:80vh;
      top:50%; left:50%; transform:translate(-50%,-50%);
      display:none; flex-direction:column;
    }
    .rp-modal.open { display:flex; }
    .rp-body { flex:1; overflow-y:auto; margin-top:6px; }
    .rp-pre { font-family:'Share Tech Mono',monospace; font-size:.72em; white-space:pre-wrap; word-break:break-all; color:var(--black); line-height:1.5; }
    #exportWrap { position:fixed; left:-9999px; top:0; background:var(--white); font-family:'Share Tech Mono','Courier New',monospace; }
    #prog { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.55); align-items:center; justify-content:center; }
    #prog.open { display:flex; }
    .pbox {
      background:var(--sl); padding:20px 30px; text-align:center;
      font-family:'VT323',monospace; font-size:1.1em; color:var(--navy);
      border-top:3px solid var(--white); border-left:3px solid var(--white);
      border-right:3px solid var(--sd); border-bottom:3px solid var(--sd);
    }
    .sbar {
      position:fixed; bottom:0; left:0; right:0; height:24px;
      background:var(--silver); border-top:2px solid var(--white);
      display:flex; align-items:center; padding:0 8px; gap:5px; z-index:100;
      font-family:'Share Tech Mono',monospace; font-size:.7em;
    }
    .scell {
      border-top:1px solid var(--sd); border-left:1px solid var(--sd);
      border-right:1px solid var(--white); border-bottom:1px solid var(--white);
      padding:1px 6px; height:16px; display:flex; align-items:center;
    }
    .sclock { margin-left:auto; }
  </style>
</head>
<body>

<div class="tb">
  <span>&#128203;</span>
  <span>Acompanhamento do Ciclo</span>
  <div class="tb-btns">
    <button class="btn grn" onclick="openShareModal()">&#128279; Compartilhar</button>
    <button class="btn grn" onclick="exportPNG()">&#x1F4F7; JPG</button>
    <button class="btn red" onclick="confirmReset()">&#x21BA; Resetar</button>
    <a class="btn" href="index.html">&#9664; In&iacute;cio</a>
  </div>
</div>

<div id="cyclesContainer"></div>

<div class="add-cycle-wrap" id="addCycleBtn">
  <button class="btn-add-cycle" onclick="addCycle()">&#43; Novo Ciclo</button>
</div>

<div class="bb" style="margin-top:10px;">
  <button class="btnm blue" onclick="openReport()">&#9658; Relat&oacute;rio</button>
  <button class="btnm blue" onclick="exportJSON()">&#128229; Exportar</button>
  <button class="btnm blue" onclick="openImportModal()">&#128228; Importar</button>
</div>

<div id="exportWrap"></div>

<!-- Overlays genéricos -->
<div class="ov" id="spOv"  onclick="closeSP()"></div>
<div class="ov" id="calOv" onclick="closeCal()"></div>

<!-- Picker de adesivos -->
<div class="sp" id="stickerPicker">
  <div class="pt"><span>Adesivo</span><button class="pc" onclick="closeSP()">&#x2715;</button></div>
  <div class="pg" id="pickerGrid"></div>
</div>

<!-- Calendário -->
<div class="cp" id="calPopup">
  <div class="ch">
    <button class="cn" onclick="calNav(-1)">&#9664;</button>
    <span class="cml" id="calLabel"></span>
    <button class="cn" onclick="calNav(1)">&#9654;</button>
  </div>
  <div class="cg" id="calGrid"></div>
</div>

<!-- Modal Importar -->
<div class="modal-ov" id="importOv" onclick="closeImportModal()"></div>
<div class="modal" id="importModal">
  <div class="mh">
    <span>&#128228; Importar JSON</span>
    <button class="pc" onclick="closeImportModal()">&#x2715;</button>
  </div>
  <input type="file" id="jsonFileInput" accept=".json" class="imp-file">
  <textarea class="imp-ta" id="jsonImportArea" placeholder="Cole o JSON aqui ou selecione um arquivo acima..."></textarea>
  <div style="display:flex;align-items:center;gap:6px;">
    <button class="btnm blue" style="flex:0;min-width:auto;padding:3px 14px;" onclick="doImport()">Importar</button>
    <button class="btnm" style="flex:0;min-width:auto;padding:3px 14px;" onclick="closeImportModal()">Cancelar</button>
    <span class="imp-msg" id="importMsg"></span>
  </div>
</div>

<!-- Modal Compartilhar -->
<div class="modal-ov" id="shareOv" onclick="closeShareModal()"></div>
<div class="share-modal" id="shareModal">
  <div class="mh">
    <span>&#128279; Compartilhar</span>
    <button class="pc" onclick="closeShareModal()">&#x2715;</button>
  </div>
  <div class="share-url" id="shareUrlText"></div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <button class="btnm blue" style="flex:0;min-width:auto;padding:3px 12px;" onclick="copyShareUrl()">Copiar link</button>
    <button class="btnm grn"  style="flex:0;min-width:auto;padding:3px 12px;" onclick="shareWA()">WhatsApp</button>
  </div>
</div>

<!-- Modal Relatório -->
<div class="modal-ov" id="rpOv" onclick="closeReport()"></div>
<div class="rp-modal" id="rpModal">
  <div class="mh" style="flex-shrink:0;">
    <span>&#9658; Relat&oacute;rio</span>
    <div style="display:flex;gap:5px;">
      <button class="btnm blue" style="flex:0;min-width:auto;padding:2px 12px;font-size:.9em;" onclick="copyReport()">Copiar</button>
      <button class="pc" onclick="closeReport()">&#x2715;</button>
    </div>
  </div>
  <div class="rp-body"><pre class="rp-pre" id="reportText"></pre></div>
</div>

<!-- PNG progress -->
<div id="prog"><div class="pbox">&#x1F4F7; Gerando JPG...<br><small style="font-size:.7em;color:#555">Aguarde...</small></div></div>

<!-- Status bar -->
<div class="sbar">
  <div class="scell" id="saveStatus">Pronto</div>
  <div class="scell sclock" id="statusClock"></div>
</div>

<script>
/* ── CONSTANTES ── */
const ND=35;
let NC=1; /* dinâmico */

let S=[new Array(ND).fill(null)];
let D=[new Array(ND).fill('')];
let X=[Array.from({length:ND},()=>['','',''])];

let pC=-1,pD=-1;
let cC=-1,cD=-1,cY=0,cM=0;
let saveTimer=null;

const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
          'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DW=['D','S','T','Q','Q','S','S'];

function tick(){
  const n=new Date();
  document.getElementById('statusClock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick,10000);

/* ── TIPOS ── */
const TID={R:'red',G:'green',Y:'yellow',W:'white_baby',B:'green_baby',X:'yellow_baby'};
const TID_REV={red:'R',green:'G',yellow:'Y',white_baby:'W',green_baby:'B',yellow_baby:'X'};

const TYPES=[
  {id:'red',        bg:'#cc0000',br:'#880000',baby:false,bc:null,     lbl:'Vermelho'},
  {id:'green',      bg:'#00aa44',br:'#007730',baby:false,bc:null,     lbl:'Verde'},
  {id:'yellow',     bg:'#ddbb00',br:'#aa8800',baby:false,bc:null,     lbl:'Amarelo'},
  {id:'white_baby', bg:'#ffffff',br:'#aaaaaa',baby:true, bc:'#333333',lbl:'Branco'},
  {id:'green_baby', bg:'#00aa44',br:'#007730',baby:true, bc:'#ffffff',lbl:'Verde'},
  {id:'yellow_baby',bg:'#ddbb00',br:'#aa8800',baby:true, bc:'#ffffff',lbl:'Amarelo'},
];
/* Adesivos sem bebê: sem numeração; bebê verde/amarelo: 1,2,3; bebê branco: P,1,2,3 */
const BADGES_SEM_BEBE  =[''];
const BADGES_BEBE_COR  =['','1','2','3'];
const BADGES_BEBE_BLANC=['','P','1','2','3'];

function bpaths(c){
  return `<circle cx="0" cy="-13" r="6" fill="${c}"/>
    <path d="M-7,0 Q-7,-7 0,-7 Q7,-7 7,0 L6,12 Q3,15 0,15 Q-3,15 -6,12 Z" fill="${c}"/>
    <line x1="-7" y1="0" x2="-13" y2="8" stroke="${c}" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="7"  y1="0" x2="13"  y2="8" stroke="${c}" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-3" y1="12" x2="-4" y2="20" stroke="${c}" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="3"  y1="12" x2="4"  y2="20" stroke="${c}" stroke-width="3.5" stroke-linecap="round"/>`;
}
function mksvg(tid,badge,size){
  const t=TYPES.find(x=>x.id===tid);if(!t)return '';
  const h=size||40,w=h,cx=w/2,cy=h/2;
  let inner='';
  if(t.baby){const sc=h/40*.62;inner+=`<g transform="translate(${cx},${cy*1.05}) scale(${sc})">${bpaths(t.bc)}</g>`;}
  if(badge){const fs=h*.26,bx=w*.78,by=h*.22,br2=h*.18;
    inner+=`<circle cx="${bx}" cy="${by}" r="${br2}" fill="#000080" opacity=".88"/>
    <text x="${bx}" y="${by}" text-anchor="middle" dominant-baseline="central"
      font-family="VT323,monospace" font-size="${fs}" fill="#fff" font-weight="bold">${badge}</text>`;}
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <rect width="${w}" height="${h}" fill="${t.bg}"/>
    <rect width="${w}" height="${h}" fill="none" stroke="${t.br}" stroke-width="2"/>
    ${inner}</svg>`;
}
function emptysvg(){
  return `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
    <rect width="40" height="40" fill="#f0f0f0"/>
    <text x="20" y="22" text-anchor="middle" dominant-baseline="central"
      font-family="VT323,monospace" font-size="14" fill="#ccc">+</text></svg>`;
}

/* ── SERIALIZAÇÃO ── */
function encodeSticker(s){if(!s)return null;const t=TID_REV[s.type]||'R';return s.badge?t+s.badge:t;}
function decodeSticker(str){if(!str||str==='.')return null;const t=TID[str[0]];if(!t)return null;return {type:t,badge:str.slice(1)||''};}

function serializeState(){
  const cycles=[];
  for(let c=0;c<NC;c++){
    const parts=[];
    for(let d=0;d<ND;d++){
      const s=S[c][d],dt=D[c][d],xs=X[c][d];
      const se=encodeSticker(s)||'';
      const xenc=xs.join('§');
      if(!s&&!dt&&xs.every(v=>!v)){parts.push('.');continue;}
      let cell=se+'|'+dt+'|'+xenc;
      cell=cell.replace(/[|§]+$/,'');
      parts.push(cell||'.');
    }
    let rle='',i=0;
    while(i<parts.length){
      if(parts[i]==='.'){let cnt=0;while(i<parts.length&&parts[i]==='.'){cnt++;i++;}rle+=(rle?';':'')+(cnt>1?cnt+'.':'.');}
      else{rle+=(rle?';':'')+parts[i];i++;}
    }
    cycles.push(rle);
  }
  return 'v3:'+cycles.join('~');
}

function deserializeState(raw){
  try{
    if(!raw||!raw.startsWith('v3:'))return false;
    const body=raw.slice(3);
    const cycleStrs=body.split('~');
    while(NC<cycleStrs.length)_growCycleData();
    for(let c=0;c<NC&&c<cycleStrs.length;c++){
      const parts=[];
      const tokens=cycleStrs[c].split(';');
      for(const tok of tokens){
        const m=tok.match(/^(\d+)\.$/);
        if(m){for(let k=0;k<parseInt(m[1]);k++)parts.push('.');}
        else parts.push(tok);
      }
      for(let d=0;d<ND&&d<parts.length;d++){
        const p=parts[d];if(!p||p==='.')continue;
        const segs=p.split('|');
        if(segs[0])S[c][d]=decodeSticker(segs[0]);
        if(segs[1])D[c][d]=segs[1];
        if(segs[2]){const xs=segs[2].split('§');X[c][d]=[xs[0]||'',xs[1]||'',xs[2]||''];}
      }
    }
    return true;
  }catch(e){return false;}
}

function saveToHash(){
  const payload=serializeState();
  history.replaceState(null,'','#'+encodeURIComponent(payload));
  document.getElementById('saveStatus').textContent='Salvo \u2713';
}
function scheduleSave(){
  document.getElementById('saveStatus').textContent='Salvando...';
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(saveToHash,700);
}
function loadFromHash(){
  const h=location.hash;
  if(h&&h.length>1){try{return deserializeState(decodeURIComponent(h.slice(1)));}catch(e){return false;}}
  return false;
}
function buildShareUrl(){saveToHash();return location.origin+location.pathname+location.hash;}

/* ── JSON export/import ── */
function stateToJSON(){
  const out={v:3,nc:NC,c:[]};
  for(let c=0;c<NC;c++){
    const days=[];
    for(let d=0;d<ND;d++)days.push({s:S[c][d]?{type:S[c][d].type,badge:S[c][d].badge}:null,dt:D[c][d],dc:X[c][d]});
    out.c.push(days);
  }
  return JSON.stringify(out,null,2);
}
function exportJSON(){
  const blob=new Blob([stateToJSON()],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`ciclo-backup-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function openImportModal(){
  document.getElementById('jsonImportArea').value='';
  document.getElementById('jsonFileInput').value='';
  const msg=document.getElementById('importMsg');msg.textContent='';msg.style.display='none';
  document.getElementById('importModal').classList.add('open');
  document.getElementById('importOv').classList.add('open');
}
function closeImportModal(){
  document.getElementById('importModal').classList.remove('open');
  document.getElementById('importOv').classList.remove('open');
}
document.getElementById('jsonFileInput').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>document.getElementById('jsonImportArea').value=e.target.result;r.readAsText(f);
});
function doImport(){
  const raw=document.getElementById('jsonImportArea').value.trim();
  const msg=document.getElementById('importMsg');msg.style.display='inline';
  try{
    const obj=JSON.parse(raw);
    if(!obj||!obj.v||!Array.isArray(obj.c))throw new Error('Formato inválido');
    /* resetar dados e UI */
    const container=document.getElementById('cyclesContainer');
    container.innerHTML='';
    NC=1;
    S=[new Array(ND).fill(null)];
    D=[new Array(ND).fill('')];
    X=[Array.from({length:ND},()=>['','',''])];
    /* crescer até o número de ciclos do JSON */
    while(NC<obj.c.length)_growCycleData();
    /* popular dados */
    for(let c=0;c<NC&&c<obj.c.length;c++){
      for(let d=0;d<ND&&d<obj.c[c].length;d++){
        const e=obj.c[c][d];
        S[c][d]=e.s?{type:e.s.type,badge:e.s.badge||''}:null;
        D[c][d]=e.dt||'';
        if(Array.isArray(e.dc))X[c][d]=[e.dc[0]||'',e.dc[1]||'',e.dc[2]||''];
        else X[c][d]=['','',''];
      }
    }
    /* reconstruir UI */
    for(let c=0;c<NC;c++)container.appendChild(buildCycleBlock(c));
    refreshAll();scheduleSave();
    msg.textContent='\u2713 Importado!';msg.style.color='#006600';
    setTimeout(()=>closeImportModal(),1200);
  }catch(e){msg.textContent='\u2716 Erro: '+e.message;msg.style.color='#880000';}
}

/* ── CRESCER APENAS OS DADOS (sem UI) ── */
function _growCycleData(){
  S.push(new Array(ND).fill(null));
  D.push(new Array(ND).fill(''));
  X.push(Array.from({length:ND},()=>['','','']));
  NC++;
}

/* ── ADICIONAR CICLO (dados + UI) ── */
function addCycle(){
  const c=NC; /* índice ANTES de incrementar */
  _growCycleData();
  const container=document.getElementById('cyclesContainer');
  container.appendChild(buildCycleBlock(c));
}

/* ── CONSTRUIR BLOCO DE UM CICLO ── */

  const win=document.createElement('div');

  /* ── DESKTOP ── */
  const scroll=document.createElement('div');scroll.className='tscroll';
  const tbl=document.createElement('table');tbl.className='ct';
  const thead=document.createElement('thead');
  const tbody=document.createElement('tbody');

  /* título ciclo */
  const tRow=document.createElement('tr');tRow.className='clr';
  const tTd=document.createElement('td');tTd.setAttribute('colspan',ND+1);
  tTd.textContent=`\u25B8 Ciclo ${c+1}`;tRow.appendChild(tTd);thead.appendChild(tRow);

  /* numeração dias */
  const nRow=document.createElement('tr');
  const nTh=document.createElement('th');nTh.className='rl';nRow.appendChild(nTh);
  for(let d=0;d<ND;d++){const th=document.createElement('th');th.className='dh';th.textContent=d+1;nRow.appendChild(th);}

  const sRow=document.createElement('tr');
  const sLbl=document.createElement('td');sLbl.className='rl';sLbl.textContent='Adesivo';sRow.appendChild(sLbl);
  for(let d=0;d<ND;d++){
    const td=document.createElement('td');td.className='sc';td.id=`sc-${c}-${d}`;

    td.innerHTML=`<div class="sw" id="sw-${c}-${d}">${emptysvg()}</div>`;
    sRow.appendChild(td);
  }
  tbody.appendChild(sRow);

  /* linha datas — exibe dd/mm */
  const dRow=document.createElement('tr');
  const dLbl=document.createElement('td');dLbl.className='rl';dLbl.textContent='Data';dRow.appendChild(dLbl);
  for(let d=0;d<ND;d++){
    const td=document.createElement('td');td.className='dtc';
    const btn=document.createElement('button');btn.className='dbtn em';btn.id=`dt-${c}-${d}`;
    btn.textContent='--/--';
    btn.onclick=e=>{e.stopPropagation();openCal(c,d,btn);};
    td.appendChild(btn);dRow.appendChild(td);
  }
  tbody.appendChild(dRow);

  /* linha descrição — 3 sublinhas */
  const descRow=document.createElement('tr');
  const descLbl=document.createElement('td');descLbl.className='rl';descLbl.textContent='Muco';descRow.appendChild(descLbl);
  for(let d=0;d<ND;d++){
    const td=document.createElement('td');td.className='desc-block';
    td.style.borderTop='1px solid #c8c8c8';

      });
      td.appendChild(ta);
    }

  }
  tbody.appendChild(descRow);

  tbl.appendChild(thead);tbl.appendChild(tbody);
  scroll.appendChild(tbl);win.appendChild(scroll);

  /* ── MOBILE ── */
  const mv=document.createElement('div');mv.className='mv';mv.id=`mv-${c}`;

  const grid=document.createElement('div');grid.className='mdg';
  for(let d=0;d<ND;d++){

    const num=document.createElement('div');num.className='mdn';num.textContent=d+1;
    /* adesivo */
    const sc=document.createElement('div');sc.className='msc';sc.id=`msc-${c}-${d}`;
    sc.innerHTML=`<div class="sw" id="msw-${c}-${d}">${emptysvg()}</div>`;
    sc.onclick=e=>{e.stopPropagation();openSP(c,d,sc);};

    const dc=document.createElement('div');dc.className='mdc';

    for(let si=0;si<3;si++){
      const ta=document.createElement('textarea');ta.className='m-sub-inp';
      ta.id=`msi-${c}-${d}-${si}`;ta.rows=1;ta.value=X[c][d][si];
      ta.addEventListener('input',()=>{
        X[c][d][si]=ta.value.toUpperCase();ta.value=ta.value.toUpperCase();
        syncSubDesktop(c,d,si);scheduleSave();
      });
      dsc.appendChild(ta);
    }
    row.append(num,sc,dc,dsc);grid.appendChild(row);
  }
  mv.appendChild(grid);win.appendChild(mv);
  return win;
}

/* ── AUTO-PREENCHER DATAS SEQUENCIAIS ── */
function autoFillDates(c,d){
  /* preenche para frente */
  for(let i=d+1;i<ND;i++){
    const base=pDateStored(D[c][d]);
    const next=new Date(base.getFullYear(),base.getMonth(),base.getDate()+(i-d));
    D[c][i]=fDateStore(next);
  }
  /* preenche para trás */
  for(let i=d-1;i>=0;i--){
    const base=pDateStored(D[c][d]);
    const prev=new Date(base.getFullYear(),base.getMonth(),base.getDate()-(d-i));
    D[c][i]=fDateStore(prev);
  }
}

/* ── REFRESH ── */
function refreshS(c,d){
  const s=S[c][d];const svg=s?mksvg(s.type,s.badge):emptysvg();
  const el=document.getElementById(`sw-${c}-${d}`);if(el)el.innerHTML=svg;
  const mel=document.getElementById(`msw-${c}-${d}`);if(mel)mel.innerHTML=svg;
}
/* Formata data armazenada (dd/mm/aaaa ou dd/mm) para exibição dd/mm */
function fmtDateDisplay(stored){
  if(!stored)return '--/--';
  const parts=stored.split('/');
  return parts[0].padStart(2,'0')+'/'+(parts[1]||'').padStart(2,'0');
}
function refreshDate(c,d){
  const txt=fmtDateDisplay(D[c][d]);
  const filled=!!D[c][d];
  const el=document.getElementById(`dt-${c}-${d}`);
  if(el){el.textContent=txt;el.className='dbtn'+(filled?' af':' em');}
  const mel=document.getElementById(`mdt-${c}-${d}`);
  if(mel){mel.textContent=txt;mel.className='mdb'+(filled?' af':' em');}
}
function refreshSubs(c,d){
  for(let si=0;si<3;si++){
    const el=document.getElementById(`si-${c}-${d}-${si}`);if(el)el.value=X[c][d][si];
    const mel=document.getElementById(`msi-${c}-${d}-${si}`);if(mel)mel.value=X[c][d][si];
  }
}
function refreshAll(){
  for(let c=0;c<NC;c++)for(let d=0;d<ND;d++){refreshS(c,d);refreshDate(c,d);refreshSubs(c,d);}
}
function syncSubMobile(c,d,si){const el=document.getElementById(`msi-${c}-${d}-${si}`);if(el)el.value=X[c][d][si];}
function syncSubDesktop(c,d,si){const el=document.getElementById(`si-${c}-${d}-${si}`);if(el)el.value=X[c][d][si];}

/* ── PICKER DE ADESIVOS ── */
function openSP(c,d,anchor){
  pC=c;pD=d;buildPG();
  const p=document.getElementById('stickerPicker');
  document.getElementById('spOv').classList.add('open');p.classList.add('open');
  posPopup(p,anchor,290,360);
}
function closeSP(){
  document.getElementById('stickerPicker').classList.remove('open');
  document.getElementById('spOv').classList.remove('open');pC=pD=-1;
}
function buildPG(){
  const g=document.getElementById('pickerGrid');g.innerHTML='';
  const cur=S[pC][pD];
  /* Sem bebê */
  addPSec(g,'Sem beb\u00ea');
  TYPES.filter(t=>!t.baby).forEach(t=>{
    BADGES_SEM_BEBE.forEach(b=>addPOpt(g,t,b,cur));
  });
  /* Bebê branco — pode ter P */
  addPSec(g,'Beb\u00ea Branco');
  const wb=TYPES.find(t=>t.id==='white_baby');
  BADGES_BEBE_BLANC.forEach(b=>addPOpt(g,wb,b,cur));
  /* Bebê verde — sem P */
  addPSec(g,'Beb\u00ea Verde');
  const gb=TYPES.find(t=>t.id==='green_baby');
  BADGES_BEBE_COR.forEach(b=>addPOpt(g,gb,b,cur));
  /* Bebê amarelo — sem P */
  addPSec(g,'Beb\u00ea Amarelo');
  const yb=TYPES.find(t=>t.id==='yellow_baby');
  BADGES_BEBE_COR.forEach(b=>addPOpt(g,yb,b,cur));
  /* Limpar */
  addPSec(g,'A\u00e7\u00e3o');
  const cl=document.createElement('div');cl.className='po';
  cl.innerHTML=`<span style="width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:1.4em;background:#f8f8f8;border:1px solid #ccc;">&#x2715;</span><span class="pol">Limpar</span>`;
  cl.onclick=()=>selS(null,'');g.appendChild(cl);
}
function addPSec(g,txt){const d=document.createElement('div');d.className='psl';d.textContent=txt;g.appendChild(d);}
function addPOpt(g,t,b,cur){
  const sel=cur&&cur.type===t.id&&cur.badge===b;
  const opt=document.createElement('div');opt.className='po'+(sel?' sel':'');
  opt.innerHTML=mksvg(t.id,b,34)+`<span class="pol">${b||(t.baby?'\u2014':t.lbl)}</span>`;
  opt.onclick=()=>selS(t.id,b);g.appendChild(opt);
}
function selS(tid,b){
  if(pC<0)return;S[pC][pD]=tid?{type:tid,badge:b}:null;
  refreshS(pC,pD);closeSP();scheduleSave();
}

/* ── CALENDÁRIO ── */
function openCal(c,d,anchor){
  cC=c;cD=d;
  const ex=D[c][d];const base=ex?pDateStored(ex):null;
  const ref=base||new Date();cY=ref.getFullYear();cM=ref.getMonth();
  renderCal();
  const p=document.getElementById('calPopup');
  document.getElementById('calOv').classList.add('open');p.classList.add('open');
  posPopup(p,anchor,200,220);
}
function closeCal(){
  document.getElementById('calPopup').classList.remove('open');
  document.getElementById('calOv').classList.remove('open');cC=cD=-1;
}
/* Parseia dd/mm/aaaa ou dd/mm */
function pDateStored(s){
  const parts=s.split('/');
  const day=parseInt(parts[0]);
  const mon=parseInt(parts[1])-1;
  const yr=parts[2]?parseInt(parts[2]):new Date().getFullYear();
  return new Date(yr,mon,day);
}
/* Salva apenas dd/mm */
function fDateStore(dt){
  return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0');
}
function calNav(dir){cM+=dir;if(cM<0){cM=11;cY--;}if(cM>11){cM=0;cY++;}renderCal();}
function renderCal(){
  const g=document.getElementById('calGrid');g.innerHTML='';
  document.getElementById('calLabel').textContent=MN[cM].slice(0,3)+' '+cY;
  DW.forEach(dw=>{const h=document.createElement('div');h.className='cdw';h.textContent=dw;g.appendChild(h);});
  const first=new Date(cY,cM,1).getDay();
  const days=new Date(cY,cM+1,0).getDate();
  const today=new Date();
  const sel=D[cC][cD]?pDateStored(D[cC][cD]):null;
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cdy emp';g.appendChild(e);}
  for(let d=1;d<=days;d++){
    const dt=new Date(cY,cM,d);
    const el=document.createElement('div');el.className='cdy';
    if(dt.toDateString()===today.toDateString())el.classList.add('today');
    if(sel&&dt.toDateString()===sel.toDateString())el.style.cssText='background:var(--navy);color:#fff;';
    el.textContent=d;
    el.addEventListener('click',()=>{
      D[cC][cD]=fDateStore(dt);
      autoFillDates(cC,cD);
      refreshAll();closeCal();scheduleSave();
    });
    g.appendChild(el);
  }
}

/* ── RELATÓRIO ── */
function openReport(){
  const lines=[];
  for(let c=0;c<NC;c++){
    lines.push(`=== Ciclo ${c+1} ===`);
    lines.push('Dia  | Data  | Descri\u00e7\u00e3o');
    lines.push('\u2500'.repeat(38));
    for(let d=0;d<ND;d++){
      const descStr=X[c][d].filter(v=>v).join(' / ')||'\u2014';
      lines.push(`${String(d+1).padEnd(4)} | ${(D[c][d]||'\u2014').padEnd(5)} | ${descStr}`);
    }
    lines.push('');
  }
  document.getElementById('reportText').textContent=lines.join('\n');
  document.getElementById('rpModal').classList.add('open');
  document.getElementById('rpOv').classList.add('open');
}
function closeReport(){
  document.getElementById('rpModal').classList.remove('open');
  document.getElementById('rpOv').classList.remove('open');
}
function copyReport(){
  navigator.clipboard.writeText(document.getElementById('reportText').textContent)
    .then(()=>alert('Relatório copiado!'))
    .catch(()=>alert('Não foi possível copiar.'));
}

/* ── COMPARTILHAR ── */
function openShareModal(){
  const url=buildShareUrl();
  document.getElementById('shareUrlText').textContent=url;
  document.getElementById('shareModal').classList.add('open');
  document.getElementById('shareOv').classList.add('open');
}
function closeShareModal(){
  document.getElementById('shareModal').classList.remove('open');
  document.getElementById('shareOv').classList.remove('open');
}
function copyShareUrl(){
  navigator.clipboard.writeText(document.getElementById('shareUrlText').textContent)
    .then(()=>alert('Link copiado!'))
    .catch(()=>alert('Não foi possível copiar.'));
}
function shareWA(){
  const url=encodeURIComponent(document.getElementById('shareUrlText').textContent);
  window.open('https://wa.me/?text='+url,'_blank');
}

/* ── EXPORT JPG ── */
function exportPNG(){
  const prog=document.getElementById('prog');prog.classList.add('open');
  const wrap=document.getElementById('exportWrap');
  wrap.innerHTML='';wrap.style.cssText='position:fixed;left:-9999px;top:0;background:#fff;padding:12px;';

  /* Para cada ciclo, calcula até qual coluna tudo está preenchido (adesivo + data + pelo menos 1 sublinha de muco) */
  function lastCompleteDay(c){
    let last=-1;
    for(let d=0;d<ND;d++){
      const hasSticker=!!S[c][d];
      const hasDate=!!D[c][d];
      const hasMuco=X[c][d].some(v=>v.trim()!=='');
      if(hasSticker&&hasDate&&hasMuco) last=d;
      else break; /* para na primeira coluna incompleta */
    }
    return last;
  }

  const cw=52;
  let anyContent=false;

  for(let c=0;c<NC;c++){
    const maxDay=lastCompleteDay(c);
    if(maxDay<0) continue; /* ciclo vazio — pula */
    anyContent=true;
    const days=Array.from({length:maxDay+1},(_,i)=>i);

    const tbl=document.createElement('table');
    tbl.style.cssText='border-collapse:collapse;margin-bottom:10px;background:#fff;font-family:Share Tech Mono,Courier New,monospace;';

    /* título */
    const tRow=document.createElement('tr');
    const tTd=document.createElement('td');tTd.setAttribute('colspan',days.length+1);
    tTd.style.cssText='background:#000080;color:#fff;font-family:VT323,monospace;font-size:13px;padding:4px 8px;letter-spacing:.06em;';
    tTd.textContent=`Ciclo ${c+1}`;tRow.appendChild(tTd);tbl.appendChild(tRow);

    /* numeração */
    const nRow=document.createElement('tr');
    const nTd=document.createElement('td');nTd.style.cssText='width:52px;background:#e8e8e8;border:1px solid #aaa;';nRow.appendChild(nTd);
    days.forEach(d=>{const td=document.createElement('td');td.style.cssText=`width:${cw}px;background:#000080;color:#fff;font-family:VT323,monospace;font-size:11px;text-align:center;border:1px solid #000060;padding:2px 0;`;td.textContent=d+1;nRow.appendChild(td);});
    tbl.appendChild(nRow);

    /* adesivos */
    const sRow=document.createElement('tr');
    const sLbl=document.createElement('td');sLbl.style.cssText='width:52px;background:linear-gradient(to bottom,#f0f0f0,#d8d8d8);font-family:VT323,monospace;font-size:10px;color:#000080;text-align:center;border:1px solid #aaa;padding:2px;vertical-align:middle;';sLbl.textContent='Adesivo';sRow.appendChild(sLbl);
    days.forEach(d=>{const td=document.createElement('td');td.style.cssText=`width:${cw}px;height:${cw}px;border:1px solid #d0d0d0;padding:0;`;td.innerHTML=S[c][d]?mksvg(S[c][d].type,S[c][d].badge,cw):emptysvg();sRow.appendChild(td);});
    tbl.appendChild(sRow);

    /* datas */
    const dRow=document.createElement('tr');
    const dLbl=document.createElement('td');dLbl.style.cssText='width:52px;background:linear-gradient(to bottom,#f0f0f0,#d8d8d8);font-family:VT323,monospace;font-size:10px;color:#000080;text-align:center;border:1px solid #aaa;padding:2px;vertical-align:middle;';dLbl.textContent='Data';dRow.appendChild(dLbl);
    days.forEach(d=>{const td=document.createElement('td');td.style.cssText=`border:1px solid #d0d0d0;padding:2px 1px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:9px;color:#000;background:#fff;`;td.textContent=fmtDateDisplay(D[c][d]);dRow.appendChild(td);});
    tbl.appendChild(dRow);

    /* descrição muco */
    const xRow=document.createElement('tr');
    const xLbl=document.createElement('td');xLbl.style.cssText='width:52px;background:linear-gradient(to bottom,#f0f0f0,#d8d8d8);font-family:VT323,monospace;font-size:10px;color:#000080;text-align:center;border:1px solid #aaa;padding:2px;vertical-align:middle;';xLbl.textContent='Muco';xRow.appendChild(xLbl);
    days.forEach(d=>{const td=document.createElement('td');td.style.cssText=`border:1px solid #d0d0d0;padding:2px 1px;text-align:center;font-family:'Share Tech Mono',monospace;font-size:8px;color:#000;background:#fff;word-break:break-all;line-height:1.4;vertical-align:top;`;td.innerHTML=X[c][d].filter(v=>v).map(v=>`<div>${v}</div>`).join('')||'';xRow.appendChild(td);});
    tbl.appendChild(xRow);

    wrap.appendChild(tbl);
  }

  if(!anyContent){
    prog.classList.remove('open');
    alert('Nenhum ciclo está completamente preenchido (adesivo + data + muco) para exportar.');
    return;
  }

  setTimeout(()=>{
    html2canvas(wrap,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false})
    .then(canvas=>{
      const a=document.createElement('a');
      a.download=`ciclo-creighton-${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.jpg`;
      a.href=canvas.toDataURL('image/jpeg',0.88);
      a.click();
    }).catch(e=>{console.error(e);alert('Erro ao exportar JPG.');})
    .finally(()=>{prog.classList.remove('open');wrap.innerHTML='';});
  },150);
}

/* ── RESET ── */
function confirmReset(){
  if(!window.confirm(`Resetar todos os dados dos ${NC} ciclo(s)?`))return;
  for(let c=0;c<NC;c++)for(let d=0;d<ND;d++){S[c][d]=null;D[c][d]='';X[c][d]=['','',''];}
  refreshAll();history.replaceState(null,'',location.pathname);
  document.getElementById('saveStatus').textContent='Resetado';
}

/* ── POSICIONAR POPUP ── */
function posPopup(el,anchor,pw,ph){
  const r=anchor.getBoundingClientRect();
  let left=r.left,top=r.bottom+4;
  if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  if(top+ph>window.innerHeight-8)top=r.top-ph-4;
  if(left<4)left=4;if(top<4)top=4;
  el.style.left=left+'px';el.style.top=top+'px';
}

/* ── ESC fecha tudo ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeSP();closeCal();closeReport();closeShareModal();closeImportModal();}
});

/* ── INIT ── */
(function(){
  const container=document.getElementById('cyclesContainer');
  container.appendChild(buildCycleBlock(0));
  const loaded=loadFromHash();
  if(loaded){
    /* se o hash tinha mais ciclos, reconstruir blocos extras */
    for(let c=1;c<NC;c++)container.appendChild(buildCycleBlock(c));
  }
  refreshAll();
  if(loaded)document.getElementById('saveStatus').textContent='Restaurado \u2713';
})();
</script>
