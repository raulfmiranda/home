<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora de Mucus Cycle Score (MCS) baseada em seis dias de observações até o dia Pico.">
  <meta name="theme-color" content="#008080">
  <title>Calc. MCS — Creighton Tools</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        #008080;
      --silver:      #c0c0c0;
      --silver-dark: #808080;
      --silver-light:#e8e8e8;
      --white:       #ffffff;
      --black:       #000000;
      --navy:        #000080;
      --scanline:    rgba(0,0,0,0.05);
    }

    html, body { min-height: 100vh; }

    body {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      background-color: var(--teal);
      background-image: repeating-linear-gradient(
        0deg,
        var(--scanline) 0px, var(--scanline) 1px,
        transparent 1px, transparent 3px
      );
      padding: 0 0 50px 0;
      color: var(--black);
    }

    /* ── TITLEBAR ── */
    .window-titlebar {
      background: linear-gradient(to right, var(--navy), #1084d0);
      color: var(--white);
      font-family: 'VT323', monospace;
      font-size: 1.1em;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: 0.05em;
      border-bottom: 2px solid var(--black);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .titlebar-btns { margin-left: auto; }

    .btn-back {
      font-family: 'VT323', monospace;
      font-size: 0.95em;
      background: var(--silver);
      color: var(--black);
      border-top: 2px solid var(--white);
      border-left: 2px solid var(--white);
      border-right: 2px solid var(--silver-dark);
      border-bottom: 2px solid var(--silver-dark);
      padding: 1px 10px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .btn-back:hover { background: var(--silver-light); }
    .btn-back:active {
      border-top: 2px solid var(--silver-dark);
      border-left: 2px solid var(--silver-dark);
      border-right: 2px solid var(--white);
      border-bottom: 2px solid var(--white);
    }

    /* ── WINDOW ── */
    .window-body {
      margin: 14px 10px;
      background: var(--silver);
      border-top: 3px solid var(--white);
      border-left: 3px solid var(--white);
      border-right: 3px solid var(--silver-dark);
      border-bottom: 3px solid var(--silver-dark);
    }

    /* ── CARD ── */
    .card {
      background: var(--silver-light);
      border-top: 2px solid var(--white);
      border-left: 2px solid var(--white);
      border-right: 2px solid var(--silver-dark);
      border-bottom: 2px solid var(--silver-dark);
      margin: 12px;
      padding: 12px;
    }

    .card-title {
      font-family: 'VT323', monospace;
      font-size: 1.05em;
      color: var(--navy);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--silver-dark);
      padding-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-subtitle {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78em;
      color: var(--black);
      margin-bottom: 8px;
    }

    /* ── TABLE WRAPPER (desktop) ── */
    .table-wrapper {
      overflow-x: auto;
      border-top: 2px solid var(--silver-dark);
      border-left: 2px solid var(--silver-dark);
      border-right: 2px solid var(--white);
      border-bottom: 2px solid var(--white);
      -webkit-overflow-scrolling: touch;
    }

    /* ── TABLE HORIZONTAL (desktop: padrão) ── */
    .tbl-horiz {
      display: block;
    }

    .tbl-horiz table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      min-width: 420px;
      background: var(--white);
    }

    .tbl-horiz th,
    .tbl-horiz td {
      border: 1px solid var(--silver-dark);
      padding: 5px 4px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82em;
    }

    .tbl-horiz thead th {
      background: var(--navy);
      color: var(--white);
      font-family: 'VT323', monospace;
      font-size: 0.95em;
      letter-spacing: 0.04em;
    }

    .tbl-horiz thead th.th-empty {
      background: var(--silver);
      border-color: var(--silver-dark);
    }

    .tbl-horiz tbody th {
      background: linear-gradient(to bottom, #f8f8f8, #d8d8d8);
      font-family: 'VT323', monospace;
      font-size: 0.95em;
      letter-spacing: 0.03em;
      text-align: left;
      padding-left: 8px;
      white-space: nowrap;
    }

    .tbl-horiz .score-row td {
      background: #efefef;
      font-family: 'VT323', monospace;
      font-size: 1.0em;
      color: var(--navy);
    }

    .tbl-horiz .result-row th {
      background: #1a1a6e;
      color: var(--white);
      font-family: 'VT323', monospace;
      font-size: 0.95em;
      letter-spacing: 0.03em;
      text-align: left;
      padding-left: 8px;
      border-color: #1a3080;
      white-space: nowrap;
    }

    .tbl-horiz .result-row td {
      background: var(--navy);
      border-color: #1a3080;
      padding: 5px 10px;
      text-align: left;
    }

    /* ── TABLE VERTICAL (mobile) ── */
    .tbl-vert {
      display: none;
      background: var(--white);
    }

    .tbl-vert table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
    }

    .tbl-vert th,
    .tbl-vert td {
      border: 1px solid var(--silver-dark);
      padding: 5px 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82em;
    }

    /* Linha de cabeçalho das colunas (Dia / Código / Pontos) */
    .tbl-vert thead th {
      background: var(--navy);
      color: var(--white);
      font-family: 'VT323', monospace;
      font-size: 0.95em;
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* Célula de dia (P-5, P-4…) na coluna esquerda */
    .tbl-vert .day-cell {
      background: linear-gradient(to right, #1a1a6e, var(--navy));
      color: var(--white);
      font-family: 'VT323', monospace;
      font-size: 0.95em;
      letter-spacing: 0.04em;
      text-align: center;
      white-space: nowrap;
      width: 52px;
    }

    /* Célula de pontuação */
    .tbl-vert .pts-cell {
      background: #efefef;
      font-family: 'VT323', monospace;
      font-size: 1.0em;
      color: var(--navy);
      text-align: center;
      width: 48px;
    }

    /* Linha de resultado (vertical) */
    .tbl-vert .result-row-v th {
      background: #1a1a6e;
      color: var(--white);
      font-family: 'VT323', monospace;
      font-size: 0.9em;
      letter-spacing: 0.04em;
      text-align: center;
      border-color: #1a3080;
    }

    .tbl-vert .result-row-v td {
      background: var(--navy);
      border-color: #1a3080;
      padding: 6px 8px;
      text-align: left;
      colspan: 2;
    }

    /* ── INPUT DE CÓDIGO ── */
    .code-input {
      width: 100%;
      border: none;
      outline: none;
      padding: 4px 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.82em;
      text-align: center;
      background: var(--white);
      text-transform: uppercase;
    }

    .code-input:focus {
      outline: 1px dotted var(--navy);
      outline-offset: -2px;
    }

    /* ── RESULTADO INLINE (dentro da tabela) ── */
    .result-inner {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .result-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .result-item-label {
      font-family: 'VT323', monospace;
      font-size: 0.72em;
      color: #a0c4ff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .result-item-value {
      font-family: 'VT323', monospace;
      font-size: 1.05em;
      color: var(--white);
      letter-spacing: 0.03em;
    }

    .result-item-value.hi-avg { color: #7fffb2; font-size: 1.1em; }
    .result-item-value.hi-cls { color: #ffe566; }

    /* ── BOTÕES ── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin: 12px;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'VT323', monospace;
      font-size: 1.05em;
      letter-spacing: 0.04em;
      background: var(--silver);
      color: var(--black);
      border-top: 3px solid var(--white);
      border-left: 3px solid var(--white);
      border-right: 3px solid var(--silver-dark);
      border-bottom: 3px solid var(--silver-dark);
      padding: 5px 14px;
      cursor: pointer;
      flex: 1;
      min-width: 110px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover { background: var(--silver-light); }
    .btn:active {
      border-top: 3px solid var(--silver-dark);
      border-left: 3px solid var(--silver-dark);
      border-right: 3px solid var(--white);
      border-bottom: 3px solid var(--white);
    }

    .btn-report { color: var(--navy); }
    .btn-reset  {
      flex: 0;
      min-width: auto;
      font-size: 0.88em;
      padding: 2px 10px;
      border-width: 2px;
      color: #880000;
    }

    /* ── RELATÓRIO ── */
    .report-card {
      display: none;
      background: var(--silver-light);
      border-top: 2px solid var(--white);
      border-left: 2px solid var(--white);
      border-right: 2px solid var(--silver-dark);
      border-bottom: 2px solid var(--silver-dark);
      margin: 12px;
      padding: 12px;
    }

    .report-card-title {
      font-family: 'VT323', monospace;
      font-size: 1.05em;
      color: var(--navy);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--silver-dark);
      padding-bottom: 4px;
    }

    #report-output {
      width: 100%;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78em;
      border-top: 2px solid var(--silver-dark);
      border-left: 2px solid var(--silver-dark);
      border-right: 2px solid var(--white);
      border-bottom: 2px solid var(--white);
      padding: 10px;
      resize: vertical;
      min-height: 150px;
      background: var(--white);
      color: var(--black);
      line-height: 1.9;
      overflow-x: auto;
      white-space: pre;
      border-radius: 0;
    }

    .report-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .btn-copy {
      font-family: 'VT323', monospace;
      font-size: 1em;
      letter-spacing: 0.04em;
      background: var(--silver);
      color: var(--black);
      border-top: 2px solid var(--white);
      border-left: 2px solid var(--white);
      border-right: 2px solid var(--silver-dark);
      border-bottom: 2px solid var(--silver-dark);
      padding: 3px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-copy:hover { background: var(--silver-light); }
    .btn-copy:active {
      border-top: 2px solid var(--silver-dark);
      border-left: 2px solid var(--silver-dark);
      border-right: 2px solid var(--white);
      border-bottom: 2px solid var(--white);
    }

    .copy-msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8em;
      color: #006600;
      display: none;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 26px;
      background: var(--silver);
      border-top: 2px solid var(--white);
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 6px;
      z-index: 100;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72em;
    }

    .status-cell {
      border-top: 1px solid var(--silver-dark);
      border-left: 1px solid var(--silver-dark);
      border-right: 1px solid var(--white);
      border-bottom: 1px solid var(--white);
      padding: 1px 8px;
      height: 18px;
      display: flex;
      align-items: center;
    }

    .status-clock { margin-left: auto; }

    /* ── RESPONSIVO ── */

    /* Desktop: tabela horizontal visível, vertical oculta */
    @media (min-width: 541px) {
      .window-body { margin: 16px; }
      .tbl-horiz th, .tbl-horiz td { font-size: 0.88em; padding: 6px; }
      #report-output { font-size: 0.85em; }
    }

    /* Mobile: inverte — mostra vertical, oculta horizontal */
    @media (max-width: 540px) {
      .tbl-horiz { display: none; }
      .tbl-vert  { display: block; }
      .table-wrapper { min-width: 0; }
    }

    @media (min-width: 1024px) {
      body { max-width: 1200px; margin: 0 auto; }
    }
  </style>
</head>

<body>

<div class="window-titlebar">
  <span>🧪</span>
  <span>Calculadora Mucus Cycle Score (MCS)</span>
  <div class="titlebar-btns">
    <a class="btn-back" href="index.html">◀ Início</a>
  </div>
</div>

<div class="window-body">
  <div id="container"></div>

  <div class="btn-row">
    <button class="btn" onclick="addCycle()">+ Novo cálculo</button>
    <button class="btn btn-report" onclick="generateReport()">▶ Gerar relatório</button>
  </div>

  <div class="report-card" id="report-section">
    <div class="report-card-title">📋 Relatório de Mucus Cycle Score</div>
    <textarea id="report-output" readonly></textarea>
    <div class="report-actions">
      <button class="btn-copy" onclick="copyReport()">Copiar</button>
      <span class="copy-msg" id="copy-msg">✓ Copiado!</span>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="status-cell">Creighton Tools v1.0</div>
  <div class="status-cell">Calc. MCS</div>
  <div class="status-cell status-clock" id="status-clock"></div>
</div>

<script>
const DAYS = ['P-5','P-4','P-3','P-2','P-1','P'];
let cycleCounter = 0;

/* ── Relógio ── */
function updateClock() {
  const n  = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('status-clock').textContent = `${hh}:${mm}`;
}
updateClock();
setInterval(updateClock, 10000);

/* ──────────────────────────────────────────────────────────
   PONTUAÇÃO DE UM CÓDIGO DE MUCO

   Sem muco → 0:         0, 2, 2W, 4
   Lubrificação pura→8:  10WL, 10DL, 10SL

   Consistência:
     10          → 4 pts
     6,8,G,P     → 2 pts  (P = aspecto pastoso/cremoso)
     outros      → 0 pts

   Cor:
     K           → 4 pts
     C ou Y      → 2 pts  (APENAS se P não estiver presente;
                            P absorve C/Y pois ambos descrevem
                            o mesmo critério de opacidade)
     B           → 0 pts

   Sensação:
     contém L    → 8 pts
     sem L       → 2 pts  (muco real não-lubrificante)

   Exemplos validados:
     6PC   = 2(P-cons) + 0(C cancelado por P) + 2(sem L) = 4
     6PCL  = 2(P-cons) + 0(C cancelado por P) + 8(L)    = 10
     8CK   = 2(8-cons) + 4(K-cor)             + 2(sem L) = 8
     10KL  = 4(10-cons)+ 4(K-cor)             + 8(L)    = 16
────────────────────────────────────────────────────────── */
function scoreMucus(raw) {
  const code = (raw || '').trim().toUpperCase();

  if (!code || code === '0' || code === '2' || code === '2W' || code === '4') return 0;
  if (code === '10WL' || code === '10DL' || code === '10SL') return 8;

  let pts = 0;

  // 1. Consistência
  if (code.includes('10')) {
    pts += 4;
  } else if (
    code.includes('6') || code.includes('8') ||
    code.includes('G') || code.includes('P')
  ) {
    pts += 2;
  }

  // 2. Cor
  if (code.includes('K')) {
    pts += 4;
  } else if ((code.includes('C') || code.includes('Y')) && !code.includes('P')) {
    // C e Y só pontuam como cor quando P NÃO está presente
    // (P já cobre o critério de opacidade/cor cremosa)
    pts += 2;
  }

  // 3. Sensação
  pts += code.includes('L') ? 8 : 2;

  return pts;
}

/* ── Classificação ── */
function classifyMCS(avg) {
  if (avg === 0)                  return 'Seco';
  if (avg >= 9.1 && avg <= 16.0) return 'Normal';
  if (avg >= 7.6 && avg <= 9.0)  return 'Médio Normal';
  if (avg >= 5.7 && avg <= 7.5)  return 'Médio Limitado';
  if (avg >  0.0 && avg <= 5.6)  return 'Limitado';
  return 'Indeterminado';
}

/* ── Bloco HTML da linha de resultado ── */
function resultHTML(total, hasAny) {
  if (!hasAny) {
    return `<div class="result-inner">
      <div class="result-item">
        <span class="result-item-label">Resultado</span>
        <span class="result-item-value">—</span>
      </div>
    </div>`;
  }
  const avg    = total / 6;
  const avgStr = avg.toFixed(1).replace('.', ',');
  const cls    = classifyMCS(avg);
  return `<div class="result-inner">
    <div class="result-item">
      <span class="result-item-label">Soma</span>
      <span class="result-item-value">${total}</span>
    </div>
    <div class="result-item">
      <span class="result-item-label">Média (MCS)</span>
      <span class="result-item-value hi-avg">${avgStr}</span>
    </div>
    <div class="result-item">
      <span class="result-item-label">Classificação</span>
      <span class="result-item-value hi-cls">${cls}</span>
    </div>
  </div>`;
}

/* ── Atualiza resultado de um ciclo ── */
function updateCycleResult(cycleId) {
  let total  = 0;
  let hasAny = false;

  for (let i = 0; i < 6; i++) {
    const val = (document.getElementById(`code-${cycleId}-${i}`) || {}).value || '';
    const pts = scoreMucus(val.trim());
    if (val.trim()) hasAny = true;
    total += pts;

    // Pontuação na tabela horizontal
    const scoreH = document.getElementById(`score-h-${cycleId}-${i}`);
    if (scoreH) scoreH.textContent = val.trim() ? pts : '';

    // Pontuação na tabela vertical
    const scoreV = document.getElementById(`score-v-${cycleId}-${i}`);
    if (scoreV) scoreV.textContent = val.trim() ? pts : '';
  }

  const rh = document.getElementById(`result-h-${cycleId}`);
  const rv = document.getElementById(`result-v-${cycleId}`);
  const html = resultHTML(total, hasAny);
  if (rh) rh.innerHTML = html;
  if (rv) rv.innerHTML = html;
}

/* ── Resetar ciclo ── */
function resetCycle(cycleId) {
  for (let i = 0; i < 6; i++) {
    const inp = document.getElementById(`code-${cycleId}-${i}`);
    if (inp) inp.value = '';
    const sh = document.getElementById(`score-h-${cycleId}-${i}`);
    if (sh) sh.textContent = '';
    const sv = document.getElementById(`score-v-${cycleId}-${i}`);
    if (sv) sv.textContent = '';
  }
  const empty = resultHTML(0, false);
  const rh = document.getElementById(`result-h-${cycleId}`);
  const rv = document.getElementById(`result-v-${cycleId}`);
  if (rh) rh.innerHTML = empty;
  if (rv) rv.innerHTML = empty;
}

/* ── Adiciona novo ciclo ── */
function addCycle() {
  cycleCounter++;
  const id  = cycleCounter;
  const div = document.createElement('div');
  div.className = 'card';
  div.id        = `cycle-${id}`;

  // Gera inputs únicos para cada dia (compartilhados entre tabelas h e v)
  const inputsHTML = DAYS.map((_, i) =>
    `<input class="code-input" id="code-${id}-${i}"
            oninput="updateCycleResult(${id})"
            placeholder="—" maxlength="8">`
  );

  /* ── TABELA HORIZONTAL (desktop) ── */
  const horizHTML = `
    <div class="tbl-horiz">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="th-empty"></th>
              ${DAYS.map(d => `<th>${d}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            <tr>
              <th>Código</th>
              ${DAYS.map((_, i) => `<td>${inputsHTML[i]}</td>`).join('')}
            </tr>
            <tr class="score-row">
              <th>Pontos</th>
              ${DAYS.map((_, i) => `<td id="score-h-${id}-${i}"></td>`).join('')}
            </tr>
            <tr class="result-row">
              <th>MCS</th>
              <td colspan="6" id="result-h-${id}">
                ${resultHTML(0, false)}
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;

  /* ── TABELA VERTICAL (mobile) ── */
  const vertHTML = `
    <div class="tbl-vert">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Dia</th>
              <th>Código de muco</th>
              <th>Pts</th>
            </tr>
          </thead>
          <tbody>
            ${DAYS.map((d, i) => `
              <tr>
                <td class="day-cell">${d}</td>
                <td>
                  <input class="code-input" id="code-v-${id}-${i}"
                         oninput="syncAndUpdate(${id}, ${i}, this.value)"
                         placeholder="—" maxlength="8">
                </td>
                <td class="pts-cell" id="score-v-${id}-${i}"></td>
              </tr>`).join('')}
            <tr class="result-row-v">
              <th colspan="3" style="padding:0;">
                <table style="width:100%;border-collapse:collapse;">
                  <tr>
                    <td colspan="3" id="result-v-${id}" style="background:var(--navy);border-color:#1a3080;padding:6px 10px;text-align:left;">
                      ${resultHTML(0, false)}
                    </td>
                  </tr>
                </table>
              </th>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;

  div.innerHTML = `
    <div class="card-title">
      <span>▸ Ciclo MCS ${id}</span>
      <button class="btn btn-reset" onclick="resetCycle(${id})" title="Limpar todos os códigos">
        ↺ Resetar
      </button>
    </div>
    <div class="card-subtitle">Códigos de muco dos seis dias até o Dia Pico (P).</div>
    ${horizHTML}
    ${vertHTML}`;

  document.getElementById('container').appendChild(div);

  // Sincroniza inputs da tabela vertical com os da horizontal
  // (ambas as tabelas referenciam os mesmos IDs code-ID-I)
  // A tabela vertical usa IDs code-v-ID-I que fazem bridge via syncAndUpdate
}

/* ── Sincroniza input vertical → horizontal e recalcula ── */
function syncAndUpdate(cycleId, dayIndex, val) {
  const hInput = document.getElementById(`code-${cycleId}-${dayIndex}`);
  if (hInput) hInput.value = val;
  updateCycleResult(cycleId);
  // Também sincroniza pontuação no vertical via updateCycleResult
}

/* ── Relatório ── */
function generateReport() {
  const header  = 'Ciclo | P-5   P-4   P-3   P-2   P-1   P     | Soma  | Média  | Classe';
  const divider = '-'.repeat(header.length);
  const rows    = [header, divider];
  let hasAny    = false;

  for (let id = 1; id <= cycleCounter; id++) {
    if (!document.getElementById(`cycle-${id}`)) continue;
    const codes = Array.from({length: 6}, (_, i) => {
      const v = (document.getElementById(`code-${id}-${i}`) || {}).value || '';
      return v.trim().toUpperCase() || '--';
    });
    if (codes.every(c => c === '--')) continue;
    hasAny = true;

    let total = 0;
    codes.forEach(c => { total += scoreMucus(c === '--' ? '' : c); });

    const avg = (total / 6).toFixed(1);
    const cls = classifyMCS(parseFloat(avg));
    const col = (s, w) => String(s).padEnd(w);

    rows.push(
      `${col(id,5)} | ${codes.map(c => col(c,5)).join(' ')} | ${col(total,5)} | ${col(avg,6)} | ${cls}`
    );
  }

  if (!hasAny) rows.push('Nenhum ciclo com códigos preenchidos.');

  const ta = document.getElementById('report-output');
  ta.value = rows.join('\n');
  ta.style.height = 'auto';
  ta.style.height = (ta.scrollHeight + 10) + 'px';

  const section = document.getElementById('report-section');
  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth' });
}

/* ── Copiar ── */
function copyReport() {
  const ta = document.getElementById('report-output');
  ta.select();
  ta.setSelectionRange(0, 99999);
  const showMsg = () => {
    const m = document.getElementById('copy-msg');
    m.style.display = 'inline';
    setTimeout(() => m.style.display = 'none', 2000);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(showMsg).catch(() => {
      document.execCommand('copy'); showMsg();
    });
  } else {
    document.execCommand('copy'); showMsg();
  }
}

addCycle();
